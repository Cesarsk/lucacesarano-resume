name: Build CV

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate compile (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Validate that main.typ compiles
        run: typst compile main.typ

  build:
    name: Build PDF (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Compile main.typ
        run: typst compile main.typ

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucacesarano-resume
          path: main.pdf
          retention-days: 90
          if-no-files-found: error
